name: Build & Release

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install Tuist
        run: |
          curl -Ls https://install.tuist.io | bash || true
          if ! command -v tuist &>/dev/null; then
            brew install --formula tuist/tuist/tuist@3 || true
          fi

      - name: Generate Project
        run: tuist generate --no-open || true

      - name: Smoke Test Pipeline
        run: |
          chmod +x ./Scripts/smoke-test.sh
          APP_DERIVED_DATA_PATH="$PWD/build-app" \
          DESIGNSYSTEM_DERIVED_DATA_PATH="$PWD/build-designsystem" \
          DOFFICEKIT_DERIVED_DATA_PATH="$PWD/build-dofficekit" \
          LEGACY_DERIVED_DATA_PATH="$PWD/build-legacy" \
          ./Scripts/smoke-test.sh

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build-app/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent Doffice.app Doffice-${GITHUB_REF_NAME}.zip
          echo "ASSET_PATH=build-app/Build/Products/Release/Doffice-${GITHUB_REF_NAME}.zip" >> $GITHUB_ENV

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
