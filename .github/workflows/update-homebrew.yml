name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Update homebrew-tap cask version
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [[ -z "${TAP_TOKEN:-}" ]]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not configured; skipping Homebrew tap update."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          echo "Updating homebrew-tap to version $VERSION"

          git clone https://x-access-token:${TAP_TOKEN}@github.com/jjunhaa0211/homebrew-tap.git
          cd homebrew-tap

          sed -i "s/version \".*\"/version \"${VERSION}\"/" Casks/doffice.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/doffice.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: bump doffice to v${VERSION}"
          git push origin main
